<!DOCTYPE html>

<script
	src="https://cdn.jsdelivr.net/npm/medium-zoom@1.1.0/dist/medium-zoom.min.js"
	onload="initMyZoom()">
</script>


<script>

// Лайтбокс для картинок (medium-zoom)
function initMyZoom() {
  window.myZoom = mediumZoom('.image-embed.is-loaded img');

  const observer = new MutationObserver(() => {
    window.myZoom.attach('.image-embed.is-loaded img');
  });

  if (document.body) {
    observer.observe(document.body, { 
      childList: true, 
      subtree: true, 
      attributes: true, 
      attributeFilter: ['class'] 
    });
  }
}

// фиксы для плагина HTML Export

// ==========================================
// СКРИПТ ФИКСОВ для Obsidian Export
// ==========================================

// Запускаем "наблюдателя", который будет проверять готовность плагина
const pluginWatcher = setInterval(() => {
  
  // Ждем ключевого момента: когда плагин сам скажет, что он полностью загрузился.
  if (window.ObsidianSite && window.ObsidianSite.isLoaded) {
    
    // Как только плагин готов — останавливаем наблюдателя, чтобы не тратить ресурсы
    clearInterval(pluginWatcher);
    console.log('✅ [Фикс] Плагин Obsidian Export полностью готов. Применяем исправления!');
    
    // Запускаем наши функции-фиксы
    fixAnchorScroll();
    expandFileTree();
  }
  
}, 250); // Проверяем готовность 4 раза в секунду


/**
 * ФИКС 1: Исправляет переход по якорным ссылкам (#)
 */
function fixAnchorScroll() {
  // Проверяем, что функция, которую мы хотим починить, существует
  if (!window.WebpageDocument || typeof window.WebpageDocument.prototype.scrollToHeader !== 'function') {
    console.error('❌ [Фикс] Не удалось найти функцию scrollToHeader. Починка скролла невозможна.');
    return;
  }
  
  // Подменяем оригинальную функцию плагина на нашу, исправленную
  window.WebpageDocument.prototype.scrollToHeader = function(hash) {
    if (!hash) return;

    let attempts = 0;
    const maxAttempts = 30; // Ждем максимум 3 секунды

    const tryScroll = () => {
      attempts++;
      
      const decodedHash = decodeURIComponent(hash);
      const headingText = decodedHash.replace(/_/g, ' ');

      const target = 
        document.getElementById(hash + '_0') ||
        document.getElementById(decodedHash + '_0') ||
        document.querySelector(`[data-heading="${headingText}"]`) ||
        document.querySelector(`[data-heading="${decodedHash}"]`);

      if (target) {
        const topOffset = target.getBoundingClientRect().top + window.pageYOffset - 80;
        window.scrollTo({ top: topOffset, behavior: 'smooth' });
        console.log(`✅ [Фикс] Якорь "${hash}" найден и прокручен!`);
      } else if (attempts < maxAttempts) {
        // Если якорь еще не появился на странице, пробуем еще раз через 100мс
        setTimeout(tryScroll, 100);
      } else {
        console.warn(`❌ [Фикс] Якорь "${hash}" так и не был найден на странице.`);
      }
    };
    
    tryScroll();
  };
  
  console.log('✅ [Фикс] Механизм скролла успешно исправлен («запатчен»).');
}


/**
 * ФИКС 2: Принудительно раскрывает древовидное меню файлов
 */
function expandFileTree() {
  const tree = window.ObsidianSite.fileTree;
  
  if (!tree) {
    console.error('❌ [Фикс] Дерево файлов (fileTree) не найдено. Раскрыть меню не удалось.');
    return;
  }

  // Используем встроенный метод плагина, чтобы обойти все папки
  tree.forAllChildren(node => {
    // Для каждой папки (node) выставляем флаг "не свернута"
    if(node.collapsable) {
      node.collapsed = false;
    }
  });

  console.log('✅ [Фикс] Команда на раскрытие всех папок в меню отправлена.');
}

</script>
