<!DOCTYPE html>
<script
	src="https://cdn.jsdelivr.net/npm/medium-zoom@1.1.0/dist/medium-zoom.min.js"
	defer></script>

<script>
// 1. Создаем ОДИН глобальный экземпляр плагина без картинок (или с начальными)
const myZoom = mediumZoom();

// 2. Периодически ищем новые картинки и скармливаем их плагину
setInterval(() => {
  		myZoom.attach('.image-embed.is-loaded img');
}, 1600);
</script>
