<!DOCTYPE html>

<script
	src="https://cdn.jsdelivr.net/npm/medium-zoom@1.1.0/dist/medium-zoom.min.js"
	onload="initMyZoom()">
</script>


<script>

// Лайтбокс для картинок (medium-zoom)
function initMyZoom() {
  console.log('✅ Скрипт полностью загружен, запускаем mediumZoom...');

  window.myZoom = mediumZoom('.image-embed.is-loaded img');

  const observer = new MutationObserver(() => {
    window.myZoom.attach('.image-embed.is-loaded img');
  });

  if (document.body) {
    observer.observe(document.body, { 
      childList: true, 
      subtree: true, 
      attributes: true, 
      attributeFilter: ['class'] 
    });
  }
}

// фиксы для плагина HTML Export
document.addEventListener('DOMContentLoaded', () => {

  // Ждем, пока плагин Obsidian полностью загрузится в память браузера
  const waitForSite = setInterval(() => {
    if (window.ObsidianSite && window.WebpageDocument) {
      clearInterval(waitForSite);
      applyFixes();
    }
  }, 50);

  function applyFixes() {
    
    // ==========================================
    // ФИКС 1: Раскрытие древовидного меню
    // ==========================================
    let treeExpanded = false;

    const expandTree = () => {
      // Раскрываем только один раз при старте, чтобы не бесить пользователя, 
      // если он потом решит свернуть какую-то папку вручную.
      if (treeExpanded) return; 
      
      const tree = window.ObsidianSite.fileTree;
      if (tree) {
        tree.collapsedRecursive = false;
        // Используем встроенный в плагин метод обхода всех папок
        tree.forAllChildren(node => { 
          node.collapsed = false; 
        });
        treeExpanded = true;
      }
    };

    // Пробуем раскрыть сразу
    if (window.ObsidianSite.isLoaded) expandTree();
    // И вешаем на хук загрузки страницы (на случай, если плагин тупит)
    window.ObsidianSite.onDocumentLoad(() => {
      setTimeout(expandTree, 100);
    });


    // ==========================================
    // ФИКС 2: Логика перехода по якорям
    // ==========================================
    
    // Сохраняем оригинальную "поломанную" функцию плагина на всякий случай
    const originalScrollToHeader = window.WebpageDocument.prototype.scrollToHeader;
    
    // Подменяем её на нашу умную версию
    window.WebpageDocument.prototype.scrollToHeader = function(hash) {
      if (!hash) return;
      
      // Раскодируем кириллицу (например, %D0%92%D0%B2 становится "Введение")
      const decodedHash = decodeURIComponent(hash);
      
      // Превращаем подчеркивания обратно в пробелы для поиска по data-heading
      // "Характеристики_и_ресурсы" -> "Характеристики и ресурсы"
      const headingText = decodedHash.replace(/_/g, ' ');

      // Ищем цель в порядке убывания надежности:
      const target = 
        // 1. По точному совпадению с суффиксом _0 (самый частый кейс)
        document.getElementById(hash + '_0') ||
        document.getElementById(decodedHash + '_0') ||
        // 2. По атрибуту data-heading (убивает проблему с пробелами/подчеркиваниями)
        document.querySelector(`[data-heading="${headingText}"]`) ||
        document.querySelector(`[data-heading="${decodedHash}"]`) ||
        // 3. Стандартный поиск, если вдруг плагин перестал добавлять _0
        document.getElementById(hash) ||
        document.getElementById(decodedHash);

      if (target) {
        // Вычисляем отступ от верха. -80px не даст заголовку прилипнуть 
        // прямо к верхнему краю экрана (визуально красивее)
        const topOffset = target.getBoundingClientRect().top + window.pageYOffset - 80;
        window.scrollTo({ top: topOffset, behavior: 'smooth' });
      } else {
        // Если вообще ничего не нашли, отдаем управление родной функции плагина
        console.warn(`[Fix Script] Якорь "${hash}" не найден, использую стандартный скролл.`);
        originalScrollToHeader.call(this, hash);
      }
    };

  }
});

</script>
