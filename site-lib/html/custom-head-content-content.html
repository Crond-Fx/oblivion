<!DOCTYPE html>

<script
	src="https://cdn.jsdelivr.net/npm/medium-zoom@1.1.0/dist/medium-zoom.min.js"
	onload="initMyZoom()">
</script>


<script>

// Лайтбокс для картинок (medium-zoom)
function initMyZoom() {
  console.log('✅ Скрипт полностью загружен, запускаем mediumZoom...');

  window.myZoom = mediumZoom('.image-embed.is-loaded img');

  const observer = new MutationObserver(() => {
    window.myZoom.attach('.image-embed.is-loaded img');
  });

  if (document.body) {
    observer.observe(document.body, { 
      childList: true, 
      subtree: true, 
      attributes: true, 
      attributeFilter: ['class'] 
    });
  }
}

// фиксы для плагина HTML Export
document.addEventListener('DOMContentLoaded', () => {

  // ==========================================
  // ФИКС 1: Жесткий скролл к якорям
  // ==========================================
  const patchScroll = setInterval(() => {
    // Ждем пока загрузится класс документа плагина
    if (window.WebpageDocument && window.WebpageDocument.prototype.scrollToHeader) {
      clearInterval(patchScroll);
      
      // Сохраняем оригинальную функцию
      const originalScrollToHeader = window.WebpageDocument.prototype.scrollToHeader;
      
      // Подменяем на нашу
      window.WebpageDocument.prototype.scrollToHeader = function(hash) {
        if (!hash) return;
        
        // Очищаем от спецсимволов и заменяем подчеркивания на пробелы
        const decodedHash = decodeURIComponent(hash);
        const headingText = decodedHash.replace(/_/g, ' '); 

        let attempts = 0;
        
        const tryScroll = () => {
          attempts++;
          
          // 1. Сначала ищем по ID (с учетом суффикса _0)
          let target = document.getElementById(hash + '_0') ||
                       document.getElementById(decodedHash + '_0') ||
                       document.getElementById(hash) ||
                       document.getElementById(decodedHash);

          // 2. Если не нашли — ищем по атрибуту data-heading (самый надежный вариант для Obsidian)
          if (!target) {
            const headings = Array.from(document.querySelectorAll('[data-heading]'));
            target = headings.find(el => {
              const data = el.getAttribute('data-heading');
              return data === headingText || data === decodedHash || data === hash;
            });
          }

          if (target) {
            console.log(`✅[Фикс] Якорь найден (попытка ${attempts})`);
            // Скроллим с поправкой в -80px, чтобы заголовок не прилипал к верху экрана
            const topOffset = target.getBoundingClientRect().top + window.pageYOffset - 80;
            window.scrollTo({ top: topOffset, behavior: 'smooth' });
          } else if (attempts < 20) {
            // Контент еще не отрендерился, ждем 100мс и пробуем снова (максимум 2 секунды)
            setTimeout(tryScroll, 100);
          } else {
            console.warn(`❌ [Фикс] Якорь "${hash}" не появился на странице.`);
            originalScrollToHeader.call(this, hash); // Отдаем обратно плагину
          }
        };
        
        // Запускаем цикл поиска
        tryScroll();
      };
    }
  }, 50);

  // ==========================================
  // ФИКС 2: Принудительное раскрытие дерева папок
  // ==========================================
  const expandTree = setInterval(() => {
    // Ждем, пока плагин полностью загрузит сайт и построит меню (#file-explorer)
    if (window.ObsidianSite && window.ObsidianSite.isLoaded && window.ObsidianSite.fileTree) {
      clearInterval(expandTree); // Останавливаем таймер
      
      const tree = window.ObsidianSite.fileTree;
      
      // Просим плагин штатно раскрыть узлы (меняет внутренние переменные плагина)
      tree.collapsedRecursive = false;

      // Грубая физическая сила: насильно удаляем классы "свернутости", 
      // потому что встроенные анимации плагина часто игнорируют команды
      const collapsedItems = document.querySelectorAll('#file-explorer .tree-item.is-collapsed');
      
      collapsedItems.forEach(el => {
        el.classList.remove('is-collapsed');
        const children = el.querySelector('.tree-item-children');
        if (children) {
          children.style.display = 'block';
          children.style.height = 'auto';
          children.style.overflow = 'visible';
        }
      });

      console.log('✅ [Фикс] Дерево папок успешно раскрыто');
    }
  }, 200);

});

</script>
