<!DOCTYPE html>

<script
	src="https://cdn.jsdelivr.net/npm/medium-zoom@1.1.0/dist/medium-zoom.min.js"
	onload="initMyZoom()">
</script>


<script>

// Лайтбокс для картинок (medium-zoom)
function initMyZoom() {
  window.myZoom = mediumZoom('.image-embed.is-loaded img');

  const observer = new MutationObserver(() => {
    window.myZoom.attach('.image-embed.is-loaded img');
  });

  if (document.body) {
    observer.observe(document.body, { 
      childList: true, 
      subtree: true, 
      attributes: true, 
      attributeFilter: ['class'] 
    });
  }
}

// фиксы для плагина HTML Export

// ==========================================
// Скрипт-разведчик для Obsidian Export
// Он ничего не чинит, только пишет в консоль.
// ==========================================

console.log('✅ [Диагност] Скрипт-разведчик запущен.');

// Флаги, чтобы не спамить в консоль
let domContentLoadedFired = false;
let windowLoadFired = false;
let obsidianSiteFound = false;
let webpageDocFound = false;
let fileTreeFound = false;
let isLoadedFlagFound = false;
let scrollPatchPossible = false;

// Сообщаем, когда сработал DOMContentLoaded
document.addEventListener('DOMContentLoaded', () => {
  console.log('✅ [ДиАГНОСТ] Событие DOMContentLoaded сработало. HTML-структура готова.');
  domContentLoadedFired = true;
});

// Сообщаем, когда сработало window.load (самое последнее событие)
window.addEventListener('load', () => {
  console.log('✅ [Диагност] Событие window.load сработало. Страница и все ресурсы (картинки, стили) загружены.');
  windowLoadFired = true;
});


// Главный шпион, который докладывает обстановку каждые 200 миллисекунд
let attempts = 0;
const inspector = setInterval(() => {
  attempts++;
  console.log(`\n--- [Диагност] Попытка #${attempts} ---`);

  // --- Проверка 1: Глобальный объект ObsidianSite ---
  if (window.ObsidianSite && !obsidianSiteFound) {
    console.log('✅ [Диагност] Объект window.ObsidianSite ОБНАРУЖЕН!');
    obsidianSiteFound = true;
  } else if (!window.ObsidianSite) {
    console.log('❌ [Диагност] window.ObsidianSite всё ещё не существует.');
  }

  // --- Проверка 2: Глобальный объект WebpageDocument ---
  if (window.WebpageDocument && !webpageDocFound) {
    console.log('✅ [Диагност] Объект window.WebpageDocument ОБНАРУЖЕН!');
    webpageDocFound = true;
  } else if (!window.WebpageDocument) {
    console.log('❌ [Диагност] window.WebpageDocument всё ещё не существует.');
  }

  // --- Проверка 3: Состояние самого плагина ---
  if (obsidianSiteFound) {
    if (window.ObsidianSite.isLoaded && !isLoadedFlagFound) {
      console.log('✅ [Диагност] Флаг window.ObsidianSite.isLoaded стал TRUE. Плагин считает, что он полностью загрузился.');
      isLoadedFlagFound = true;
    } else {
      console.log(`ℹ️ [Диагност] Состояние флага isLoaded: ${window.ObsidianSite.isLoaded}`);
    }
    
    if (window.ObsidianSite.fileTree && !fileTreeFound) {
      console.log('✅ [Диагност] Дерево папок window.ObsidianSite.fileTree ОБНАРУЖЕНО!');
      fileTreeFound = true;
    } else if (!window.ObsidianSite.fileTree) {
      console.log('❌ [Диагност] Дерево папок fileTree всё ещё не создано.');
    }
  }
  
  // --- Проверка 4: Возможность починить скролл ---
  if (webpageDocFound) {
    if (typeof window.WebpageDocument.prototype.scrollToHeader === 'function' && !scrollPatchPossible) {
      console.log('✅ [Диагност] Функция scrollToHeader НАЙДЕНА. Скролл можно починить!');
      scrollPatchPossible = true;
    } else if (typeof window.WebpageDocument.prototype.scrollToHeader !== 'function') {
        console.log('❌ [Диагност] Функция scrollToHeader НЕ найдена или НЕ является функцией. Починка скролла невозможна.');
    }
  }

  // Останавливаем шпиона через 10 секунд
  if (attempts > 50) {
    clearInterval(inspector);
    console.log('\n🛑 [Диагност] Сбор данных завершен (прошло 10 секунд).');
  }
}, 200);

</script>
