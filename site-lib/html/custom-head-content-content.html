<!DOCTYPE html>

<script
	src="https://cdn.jsdelivr.net/npm/medium-zoom@1.1.0/dist/medium-zoom.min.js"
	onload="initMyZoom()">
</script>


<script>

// Лайтбокс для картинок (medium-zoom)
function initMyZoom() {
  window.myZoom = mediumZoom('.image-embed.is-loaded img');

  const observer = new MutationObserver(() => {
    window.myZoom.attach('.image-embed.is-loaded img');
  });

  if (document.body) {
    observer.observe(document.body, { 
      childList: true, 
      subtree: true, 
      attributes: true, 
      attributeFilter: ['class'] 
    });
  }
}


// ==========================================
// ФИНАЛЬНЫЙ СКРИПТ ФИКСОВ для Obsidian Export
// ==========================================

const pluginWatcher = setInterval(() => {
  if (window.ObsidianSite && window.ObsidianSite.isLoaded) {
    clearInterval(pluginWatcher);
    console.log('✅ [Фикс] Плагин Obsidian Export полностью готов. Применяем исправления!');
    fixAnchorScroll();
    expandFileTree();
  }
}, 250);

/**
 * ФИКС 1: Исправляет переход по якорным ссылкам (#)
 */
function fixAnchorScroll() {
  if (!window.WebpageDocument || typeof window.WebpageDocument.prototype.scrollToHeader !== 'function') {
    console.error('❌ [Фикс] Не удалось найти функцию scrollToHeader. Починка скролла невозможна.');
    return;
  }
  
  window.WebpageDocument.prototype.scrollToHeader = function(hash) {
    if (!hash) return;

    let attempts = 0;
    const maxAttempts = 30;

    const tryScroll = () => {
      attempts++;
      
      const decodedHash = decodeURIComponent(hash);
      const headingText = decodedHash.replace(/_/g, ' ');

      const target = 
        document.getElementById(hash + '_0') ||
        document.getElementById(decodedHash + '_0') ||
        document.querySelector(`[data-heading="${headingText}"]`) ||
        document.querySelector(`[data-heading="${decodedHash}"]`);

      if (target) {
        // --- ИЗМЕНЕНИЕ ЗДЕСЬ ---
        // Запускаем плавную прокрутку до элемента.
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        console.log(`✅ [Фикс] Якорь "${hash}" найден! Запускаю скролл и жду его завершения...`);
        
        // Запускаем детектор, который будет следить за окончанием анимации
        waitForScrollEndThenOffset();

      } else if (attempts < maxAttempts) {
        setTimeout(tryScroll, 100);
      } else {
        console.warn(`❌ [Фикс] Якорь "${hash}" так и не был найден на странице.`);
      }
    };
    
    tryScroll();
  };
  
  console.log('✅ [Фикс] Механизм скролла заменен на детектор остановки.');
}

/**
 * Эта функция ждет, пока плавная прокрутка не закончится, и только потом применяет отступ.
 */
function waitForScrollEndThenOffset() {
    let lastScrollY = window.pageYOffset;
    let timeout = null;

    const scrollCheck = setInterval(() => {
        const currentScrollY = window.pageYOffset;

        // Если позиция перестала меняться, значит, скролл завершился
        if (currentScrollY === lastScrollY) {
            clearInterval(scrollCheck);
            clearTimeout(timeout);
            window.scrollBy(0, -180);
            console.log('✅ [Фикс] Анимация скролла завершена. Отступ применен.');
        } else {
            lastScrollY = currentScrollY;
        }
    }, 100); // Проверяем каждые 100 мс

    // Аварийный остановщик, если что-то пойдет не так (например, пользователь сам начнет скроллить)
    timeout = setTimeout(() => {
        clearInterval(scrollCheck);
    }, 2000); // Максимум ждем 2 секунды
}


/**
 * ФИКС 2: Принудительно раскрывает древовидное меню файлов
 */
function expandFileTree() {
  const tree = window.ObsidianSite.fileTree;
  
  if (!tree) {
    console.error('❌ [Фикс] Дерево файлов (fileTree) не найдено. Раскрыть меню не удалось.');
    return;
  }

  tree.forAllChildren(node => {
    if(node.collapsable) {
      node.collapsed = false;
    }
  });

  console.log('✅ [Фикс] Команда на раскрытие всех папок в меню отправлена.');
}

</script>
