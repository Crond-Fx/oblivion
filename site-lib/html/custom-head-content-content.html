<!DOCTYPE html>

<script
	src="https://cdn.jsdelivr.net/npm/medium-zoom@1.1.0/dist/medium-zoom.min.js"
	onload="initMyZoom()">
</script>


<script>

// Лайтбокс для картинок (medium-zoom)
function initMyZoom() {
  window.myZoom = mediumZoom('.image-embed.is-loaded img');

  const observer = new MutationObserver(() => {
    window.myZoom.attach('.image-embed.is-loaded img');
  });

  if (document.body) {
    observer.observe(document.body, { 
      childList: true, 
      subtree: true, 
      attributes: true, 
      attributeFilter: ['class'] 
    });
  }
}


// ==========================================
// ФИНАЛЬНЫЙ СКРИПТ-ДИАГНОСТ для Obsidian Export
// Цель: понять, почему не работает отступ -80px
// ==========================================

const pluginWatcher = setInterval(() => {
  if (window.ObsidianSite && window.ObsidianSite.isLoaded) {
    clearInterval(pluginWatcher);
    console.log('✅ [Диагност] Плагин готов. Внедряю разведчика в функцию скролла...');
    patchScrollForDiagnostics();
  }
}, 250);

function patchScrollForDiagnostics() {
  if (!window.WebpageDocument || typeof window.WebpageDocument.prototype.scrollToHeader !== 'function') {
    return;
  }
  
  window.WebpageDocument.prototype.scrollToHeader = function(hash) {
    if (!hash) return;
    let target = null;
    let attempts = 0;

    const findTargetInterval = setInterval(() => {
        attempts++;
        const decodedHash = decodeURIComponent(hash);
        const headingText = decodedHash.replace(/_/g, ' ');

        target = 
            document.getElementById(hash + '_0') ||
            document.getElementById(decodedHash + '_0') ||
            document.querySelector(`[data-heading="${headingText}"]`) ||
            document.querySelector(`[data-heading="${decodedHash}"]`);

        if (target || attempts >= 30) {
            clearInterval(findTargetInterval);
            if (target) {
                console.log(`✅ [Диагност] Якорь "${hash}" найден. Запускаю скролл и слежку.`);
                target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                waitForScrollEndThenDiagnoseOffset();
            } else {
                console.warn(`❌ [Диагност] Якорь "${hash}" не найден.`);
            }
        }
    }, 100);
  };
}


function waitForScrollEndThenDiagnoseOffset() {
    console.log('ℹ️ [Диагност] Детектор запущен. Жду, когда страница перестанет двигаться...');
    let lastScrollY = window.pageYOffset;
    let timeout = null;
    let stillScrolling = 0;

    const scrollCheck = setInterval(() => {
        const currentScrollY = window.pageYOffset;

        if (currentScrollY === lastScrollY) {
            stillScrolling++;
            // Ждем 3 последовательных "тихих" тика, чтобы быть на 100% уверенным, что анимация кончилась
            if (stillScrolling >= 3) {
                clearInterval(scrollCheck);
                clearTimeout(timeout);
                
                // --- НАЧАЛО ГЛАВНОГО АНАЛИЗА ---
                console.groupCollapsed('✅ [Диагност] АНИМАЦИЯ ЗАВЕРШЕНА. НАЧИНАЮ АНАЛИЗ ОТСТУПА.');
                
                const scrollPosBefore = window.pageYOffset;
                console.log(`- Текущая позиция (до отступа): ${scrollPosBefore}px`);
                console.log(`- Стиль overflow у <body>: '${getComputedStyle(document.body).overflow}'`);
                console.log(`- Стиль overflow у <html>: '${getComputedStyle(document.documentElement).overflow}'`);
                
                console.log('--- КОМАНДА: window.scrollBy(0, -80) ---');
                window.scrollBy(0, -80);
                
                const scrollPosAfter = window.pageYOffset;
                console.log(`- Позиция СРАЗУ ПОСЛЕ команды: ${scrollPosAfter}px`);

                if (scrollPosAfter < scrollPosBefore) {
                    console.log('✅ УСПЕХ! Команда сдвинула страницу.');
                } else {
                    console.log('❌ ПРОВАЛ! Команда была проигнорирована или не сработала.');
                }

                setTimeout(() => {
                    const finalScrollPos = window.pageYOffset;
                    console.log(`- Финальная позиция (через 200мс): ${finalScrollPos}px`);
                    if (finalScrollPos === scrollPosAfter) {
                        console.log('ℹ️ Позиция стабильна. Никто не помешал.');
                    } else {
                        console.log('❗️❗️❗️ ВНИМАНИЕ! Что-то другое ВЕРНУЛО скролл на место ПОСЛЕ нашего фикса.');
                    }
                    console.groupEnd();
                }, 200);
                // --- КОНЕЦ ГЛАВНОГО АНАЛИЗА ---
            }
        } else {
            stillScrolling = 0;
            lastScrollY = currentScrollY;
        }
    }, 50);

    timeout = setTimeout(() => {
        clearInterval(scrollCheck);
        console.warn('[Диагност] Аварийное отключение детектора через 2 секунды.');
    }, 2000);
}

</script>
