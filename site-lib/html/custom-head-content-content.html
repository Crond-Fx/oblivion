<!DOCTYPE html>
<script	src="https://cdn.jsdelivr.net/npm/medium-zoom@1.1.0/dist/medium-zoom.min.js" onload="initMyZoom()"></script>

<script>
function initMyZoom() {
  console.log('✅ Скрипт полностью загружен, запускаем mediumZoom...');

  window.myZoom = mediumZoom('.image-embed.is-loaded img');

  const observer = new MutationObserver(() => {
    window.myZoom.attach('.image-embed.is-loaded img');
  });

  if (document.body) {
    observer.observe(document.body, { 
      childList: true, 
      subtree: true, 
      attributes: true, 
      attributeFilter: ['class'] 
    });
  }
}
</script>
